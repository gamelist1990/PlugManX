name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve release versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          PLUGMAN_VERSION="$(mvn -B -N -q help:evaluate -Dexpression=plugman.version -DforceStdout | tail -n 1 | tr -d '\r')"
          PROJECT_VERSION="$(mvn -B -N -q help:evaluate -Dexpression=project.version -DforceStdout | tail -n 1 | tr -d '\r')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "plugman_version=${PLUGMAN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "project_version=${PROJECT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag and pom versions
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.versions.outputs.tag_version }}" != "${{ steps.versions.outputs.plugman_version }}" ]]; then
            echo "Tag version (v${{ steps.versions.outputs.tag_version }}) must match plugman.version (${{ steps.versions.outputs.plugman_version }})."
            exit 1
          fi
          if [[ "${{ steps.versions.outputs.project_version }}" != "${{ steps.versions.outputs.plugman_version }}" ]]; then
            echo "project.version (${{ steps.versions.outputs.project_version }}) must match plugman.version (${{ steps.versions.outputs.plugman_version }})."
            exit 1
          fi

      - name: Install parent POM
        run: mvn -B -N install

      - name: Initialize Paper NMS mappings
        run: mvn -B -f plugman-paper/pom.xml paper-nms:init

      - name: Build with Maven
        run: mvn -B clean package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: PlugManX v${{ steps.versions.outputs.plugman_version }}
          tag_name: v${{ steps.versions.outputs.plugman_version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            target/PlugManX.jar
            target/PlugManX-${{ steps.versions.outputs.plugman_version }}.jar
